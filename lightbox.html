<!-- Images used to open the lightbox -->
<body>
<link href="lightbox.css" rel="stylesheet">

<div class="row">
  <div class="column">
    <img src="Mercury.webp" onclick="openModal();currentSlide(1)" class="hover-shadow">
  </div>
  <div class="column">
    <img src="Venus.webp" onclick="openModal();currentSlide(2)" class="hover-shadow">
  </div>
  <div class="column">
    <img src="Earth.webp" onclick="openModal();currentSlide(3)" class="hover-shadow">
  </div>
  <div class="column">
    <img src="Mars.webp" onclick="openModal();currentSlide(4)" class="hover-shadow">
  </div>
  <div class="column">
    <img src="Jupiter.webp" onclick="openModal();currentSlide(4)" class="hover-shadow">
  </div>
  <div class="column">
    <img src="Saturn.webp" onclick="openModal();currentSlide(4)" class="hover-shadow">
  </div>
  <div class="column">
    <img src="Uranus.webp" onclick="openModal();currentSlide(4)" class="hover-shadow">
  </div>
  <div class="column">
    <img src="Neptune.webp" onclick="openModal();currentSlide(4)" class="hover-shadow">
  </div>
</div>

<!-- The Modal/Lightbox -->
<div id="myModal" class="modal">
  <span class="close cursor" onclick="closeModal()">&times;</span>
  <div class="modal-content">

    <div class="mySlides">
      <div class="numbertext">1 / 8</div>
      <img src="Mercury.webp" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">2 / 8</div>
      <img src="Venus.webp" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">3 / 8</div>
      <img src="Earth.webp" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">4 / 8</div>
      <img src="Mars.webp" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">5 / 8</div>
      <img src="Jupiter.webp" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">6 / 8</div>
      <img src="Saturn.webp" style="width:100%">
    </div>

     <div class="mySlides">
      <div class="numbertext">7 / 8</div>
      <img src="Uranus.webp" style="width:100%">
    </div>

      <div class="mySlides">
      <div class="numbertext">8 / 8</div>
      <img src="Neptune.webp" style="width:100%">
    </div>
    <!-- Next/previous controls -->
    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
    <a class="next" onclick="plusSlides(1)">&#10095;</a>

    <!-- Caption text -->
    <div class="caption-container">
      <p id="caption"></p>
    </div>

    <!-- Thumbnail image controls -->
    <div class="column">
      <img class="demo" src="Mercury.webp" onclick="currentSlide(1)" alt="Mercury">
    </div>

    <div class="column">
      <img class="demo" src="Venus.webp" onclick="currentSlide(2)" alt="Venus">
    </div>

    <div class="column">
      <img class="demo" src="Earth.webp" onclick="currentSlide(3)" alt="Earth">
    </div>

    <div class="column">
      <img class="demo" src="Mars.webp" onclick="currentSlide(4)" alt="Mars">
    </div>

    <div class="column">
      <img class="demo" src="Jupiter.webp" onclick="currentSlide(5)" alt="Jupiter">
    </div>

    <div class="column">
      <img class="demo" src="Saturn.webp" onclick="currentSlide(6)" alt="Saturn">
    </div>

    <div class="column">
      <img class="demo" src="Uranus.webp" onclick="currentSlide(7)" alt="Uranus">
    </div>

    <div class="column">
      <img class="demo" src="Neptune.webp" onclick="currentSlide(8)" alt="Neptune">
    </div>


  </div>
</div>

<script>
// Open the Modal
function openModal() {
  document.getElementById("myModal").style.display = "block";
}

// Close the Modal
function closeModal() {
  document.getElementById("myModal").style.display = "none";
}

var slideIndex = 1;
showSlides(slideIndex);

// Next/previous controls
function plusSlides(n) {
  showSlides(slideIndex += n);
}

// Thumbnail image controls
function currentSlide(n) {
  showSlides(slideIndex = n);
}

function showSlides(n) {
  var i;
  var slides = document.getElementsByClassName("mySlides");
  var dots = document.getElementsByClassName("demo");
  var captionText = document.getElementById("caption");
  if (n > slides.length) {slideIndex = 1}
  if (n < 1) {slideIndex = slides.length}
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }
  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[slideIndex-1].style.display = "block";
  dots[slideIndex-1].className += " active";
  captionText.innerHTML = dots[slideIndex-1].alt;
}
</script>
</body>
